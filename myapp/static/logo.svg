<svg width="256" height="256" viewBox="0 0 256 256"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Sombra suave del calendario -->
  <rect x="32" y="40" width="160" height="150" rx="22" ry="22"
        fill="rgba(15,23,42,0.7)" />

  <!-- Cuerpo del calendario con efecto “glass/LED” -->
  <rect x="32" y="36" width="160" height="148" rx="22" ry="22"
        fill="rgba(15,23,42,0.9)"
        stroke="#38bdf8" stroke-width="3" />

  <!-- Glow exterior tipo LED -->
  <rect x="32" y="36" width="160" height="148" rx="22" ry="22"
        fill="none"
        stroke="#38bdf8" stroke-width="6"
        opacity="0.45" />

  <!-- Barra superior del calendario con misma forma que el contorno -->
  <!-- x=32, width=160, radio 22, altura 44 -->
  <path
    d="
      M 54 36
      H 170
      A 22 22 0 0 1 192 58
      V 80
      H 32
      V 58
      A 22 22 0 0 1 54 36
      Z
    "
    fill="url(#headerGradient)" />

  <!-- Línea divisoria -->
  <line x1="32" y1="84" x2="192" y2="84"
        stroke="rgba(148,163,184,0.8)" stroke-width="2" />

  <!-- Anillas -->
  <line x1="72"  y1="22" x2="72"  y2="40" stroke="#e5e7eb" stroke-width="5" />
  <line x1="112" y1="22" x2="112" y2="40" stroke="#e5e7eb" stroke-width="5" />
  <line x1="152" y1="22" x2="152" y2="40" stroke="#e5e7eb" stroke-width="5" />

  <!-- Texto "Calendario" -->
  <text x="112" y="64" text-anchor="middle"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" fill="#f9fafb">
    Calendario
  </text>

  <!-- “Días” -->
  <g fill="#e5e7eb" opacity="0.35">
    <rect x="56"  y="96" width="18" height="18" rx="4" />
    <rect x="90"  y="96" width="18" height="18" rx="4" />
    <rect x="124" y="96" width="18" height="18" rx="4" />
    <rect x="158" y="96" width="18" height="18" rx="4" />
    <rect x="56"  y="128" width="18" height="18" rx="4" />
    <rect x="90"  y="128" width="18" height="18" rx="4" />
    <rect x="124" y="128" width="18" height="18" rx="4" />
    <rect x="158" y="128" width="18" height="18" rx="4" />
  </g>

  <!-- Gradientes -->
  <defs>
    <!-- Header del calendario: azul -> violeta -->
    <linearGradient id="headerGradient" x1="32" y1="36" x2="192" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <!-- Texto PY: color atractivo con buen contraste -->
    <linearGradient id="pyGradient" x1="16" y1="176" x2="120" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#facc15" />
    </linearGradient>
  </defs>

  <!-- Glow para PY -->
  <text x="130" y="200"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-weight="700"
        font-size="72"
        fill="none"
        stroke="#38bdf8" stroke-width="6" opacity="0.4">
    PY
  </text>

  <!-- Texto PY en esquina inferior (superpuesto) -->
  <text x="130" y="200"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-weight="700"
        font-size="72"
        fill="url(#pyGradient)"
        stroke="#020617" stroke-width="2">
    PY
  </text>
</svg>
